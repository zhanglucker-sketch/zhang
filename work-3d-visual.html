<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作品预览 | ZHANG QI</title>
<style>
:root { --accent: #ffffff; --bg: #050505; --glass: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.1); }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--accent); font-family: sans-serif; overflow: hidden; height: 100vh; touch-action: none; }

.nav {
  position: fixed; top:0; left:0; width:100%; height:70px;
  backdrop-filter: blur(20px); background: var(--glass);
  border-bottom:1px solid var(--border);
  display: flex; align-items: center; padding:0 24px; z-index: 1000;
}
.nav-back { color: var(--accent); text-decoration: none; font-size: 0.9rem; }

.viewer {
  width: 100vw; height: 100vh; position: relative;
  cursor: grab; overflow: hidden; background: #000;
}
.work-img {
  position: absolute; transform-origin: 0 0;
  will-change: transform; user-select: none; -webkit-user-drag: none;
  display: block;
}

.download-bar { position: fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index: 1000; }
.download-btn {
  padding:12px 32px; background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px); color:#fff; border: 1px solid var(--border);
  border-radius: 50px; cursor: pointer; transition: all 0.3s;
}
.download-btn:hover { background: rgba(255,255,255,0.2); }

.tip {
  position: fixed; top: 85px; right: 20px;
  background: var(--glass); padding: 6px 12px; border-radius: 6px;
  font-size: 12px; color: rgba(255,255,255,0.4); z-index: 100;
}
</style>

<body>

<div class="nav">
  <a href="index.html#work" class="nav-back">← 返回作品集</a>
</div>
<div class="tip">滚轮|双指缩放 / 拖拽查看</div>

<div class="viewer" id="viewer">
  <img src="https://lucker-1255468956.cos.ap-guangzhou.myqcloud.com/assets/images/3d-visual.jpg" class="work-img" id="workImg">
</div>

<div class="download-bar">
  <button class="download-btn" id="downloadBtn">下载高清原件</button>
</div>

<script>
const img = document.getElementById('workImg');
const viewer = document.getElementById('viewer');
const downloadBtn = document.getElementById('downloadBtn');

let scale = 1, minScale = 0.1, translateX = 0, translateY = 0;
let isDragging = false, startX = 0, startY = 0;
let initialDist = 0, initialScale = 1;

function initImage() {
    if (!img.naturalWidth) return;
    const vW = window.innerWidth, vH = window.innerHeight - 70;
    const iW = img.naturalWidth, iH = img.naturalHeight;
    const sW = vW / iW, sH = vH / iH;
    minScale = Math.min(sW, sH);
    scale = sW; 
    translateX = (vW - iW * scale) / 2;
    translateY = 70;
    updateTransform();
}

function updateTransform() {
    const vW = window.innerWidth, vH = window.innerHeight;
    const curW = img.naturalWidth * scale, curH = img.naturalHeight * scale;
    if (curW <= vW) translateX = (vW - curW) / 2;
    else translateX = Math.min(0, Math.max(translateX, vW - curW));
    if (curH <= (vH - 70)) translateY = 70 + (vH - 70 - curH) / 2;
    else translateY = Math.min(70, Math.max(translateY, vH - curH));
    img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

const getDist = (t1, t2) => Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
const getCenter = (t1, t2) => ({ x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 });

viewer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
    } else if (e.touches.length === 2) {
        isDragging = false;
        initialDist = getDist(e.touches[0], e.touches[1]);
        initialScale = scale;
    }
}, {passive: false});

viewer.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateTransform();
    } else if (e.touches.length === 2) {
        const curDist = getDist(e.touches[0], e.touches[1]);
        const center = getCenter(e.touches[0], e.touches[1]);
        const oldScale = scale;
        scale = Math.min(Math.max(minScale, (curDist / initialDist) * initialScale), 5);
        const ratio = scale / oldScale;
        translateX = center.x - (center.x - translateX) * ratio;
        translateY = center.y - (center.y - translateY) * ratio;
        updateTransform();
    }
}, {passive: false});

window.addEventListener('touchend', () => isDragging = false);

viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const oldScale = scale;
    scale = Math.min(Math.max(minScale, scale * (e.deltaY > 0 ? 0.9 : 1.1)), 5);
    const ratio = scale / oldScale;
    translateX = e.clientX - (e.clientX - translateX) * ratio;
    translateY = e.clientY - (e.clientY - translateY) * ratio;
    updateTransform();
}, { passive: false });

viewer.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
});
window.addEventListener('mousemove', (e) => {
    if (!isDragging || e.touches) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    updateTransform();
});
window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('resize', initImage);
if (img.complete) initImage(); else img.onload = initImage;

downloadBtn.onclick = async () => {
    try {
        const res = await fetch(img.src, { mode: 'cors' });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'ZHANGQI_Work.jpg';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); window.URL.revokeObjectURL(url);
    } catch (err) { window.open(img.src, '_blank'); }
};
</script>
</body>
</html>
